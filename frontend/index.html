<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Notes App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🎀 Notes App 🎀</h1>

  <div id="notes" class="notes"></div>
</div>

<script src="script.js"></script>
</body>
</html>
